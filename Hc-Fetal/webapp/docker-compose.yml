version: '3.8'

services:
  webapp:
    build:
      context: ..
      dockerfile: webapp/Dockerfile
    container_name: fetal-hc-webapp
    ports:
      - "5000:5000"
    volumes:
      # Mount data directories for persistence
      - ./data/uploads:/app/data/uploads
      - ./data/processed:/app/data/processed
      - ./data/results.csv:/app/data/results.csv
      # Mount model directory
      - ./models:/app/models
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
