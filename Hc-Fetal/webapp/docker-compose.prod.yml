version: '3.8'

services:
  webapp:
    build:
      context: ..
      dockerfile: webapp/Dockerfile.prod
    container_name: fetal-hc-webapp-prod
    expose:
      - "5000"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/processed:/app/data/processed
      - ./data/results.csv:/app/data/results.csv
      - ./models:/app/models:ro
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - WORKERS=4
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: fetal-hc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webapp
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  uploads:
  processed:
