services:
  - type: web
    name: hc-fetal-webapp
    env: docker
    branch: main
  dockerfilePath: Dockerfile
    # Let Dockerfile handle build and start. Ensure Render routes to port 5000.
    plan: starter
    envVars:
      - key: PORT
        value: "5000"
    healthCheckPath: /status
    disk: 100 # MB (adjust if needed for model files)
    region: oregon
